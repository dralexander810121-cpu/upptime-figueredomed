name: Response Time CI
on:
  repository_dispatch:
    types: [response_time]
  schedule:
    - cron: "0 23 * * *"
  workflow_dispatch:
jobs:
  release:
    name: Check response time
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.GH_PAT }}
      - name: Check response time
        uses: upptime/uptime-monitor@v1.41.3
        with:
          command: "response-time"
        env:
          GH_PAT: ${{ secrets.GH_PAT }}

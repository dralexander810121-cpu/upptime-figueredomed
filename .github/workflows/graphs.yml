name: Graphs CI
on:
  repository_dispatch:
    types: [graphs]
  schedule:
    - cron: "0 0 * * *"
  workflow_dispatch:
jobs:
  release:
    name: Generate graphs
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.GH_PAT }}
      - name: Generate graphs
        uses: upptime/uptime-monitor@v1.41.3
        with:
          command: "graphs"
        env:
          GH_PAT: ${{ secrets.GH_PAT }}

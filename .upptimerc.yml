# ────────────────────────────────────────────────────────────────────
# Workflow scheduling
# ────────────────────────────────────────────────────────────────────
workflowSchedule:
  graphs: "0 0 * * *"           # Daily summary
  responseTime: "0 23 * * *"    # Daily response time aggregation
  staticSite: "0 1 * * *"       # Daily site rebuild
  summary: "0 0 * * *"          # Daily incident summary
  updateTemplate: "0 0 1 * *"   # Monthly template refresh
  updates: "0 3 * * *"          # Daily uptime/downtime check
  uptime: "*/5 * * * *"         # Every 5 minutes
